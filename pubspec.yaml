name: pinterest_clone
description: A pixel-perfect Pinterest clone built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Image Loading & Caching
  cached_network_image: ^3.4.1

  # Shimmer Loading
  shimmer: ^3.0.0

  # Grid Layout
  flutter_staggered_grid_view: ^0.7.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Share
  share_plus: ^12.0.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  appwrite: 21.1.0
  image_picker: 1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
